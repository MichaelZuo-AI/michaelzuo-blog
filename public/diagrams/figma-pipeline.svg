<svg xmlns="http://www.w3.org/2000/svg" width="820" height="250" viewBox="0 0 820 250">
  <rect width="820" height="250" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <filter id="rough4">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise" seed="12"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">Figma-to-Code Pipeline</text>

  <!-- Box 1: Designer -->
  <rect x="20" y="55" width="155" height="60" rx="8" ry="8" fill="#F3E5F5" stroke="#333" stroke-width="1.5" filter="url(#rough4)"/>
  <text x="97" y="82" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Designer</text>
  <text x="97" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">(Figma)</text>

  <!-- Arrow 1 -->
  <line x1="175" y1="85" x2="210" y2="85" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Box 2: Figma File -->
  <rect x="215" y="55" width="155" height="60" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough4)"/>
  <text x="292" y="82" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Figma File</text>
  <text x="292" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">(structured)</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="85" x2="405" y2="85" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Box 3: Extraction -->
  <rect x="410" y="55" width="165" height="60" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="1.5" filter="url(#rough4)"/>
  <text x="492" y="82" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Extraction</text>
  <text x="492" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">tokens + markup</text>

  <!-- Arrow 3 -->
  <line x1="575" y1="85" x2="610" y2="85" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Box 4: Claude Code -->
  <rect x="615" y="55" width="180" height="60" rx="8" ry="8" fill="#FFF3E0" stroke="#333" stroke-width="1.5" filter="url(#rough4)"/>
  <text x="705" y="82" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Claude Code</text>
  <text x="705" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">refactor + tests</text>

  <!-- Arrow down from Claude Code -->
  <line x1="705" y1="115" x2="705" y2="155" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Box 5: Production Components -->
  <rect x="580" y="160" width="250" height="55" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="2" filter="url(#rough4)"/>
  <text x="705" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">Production Components</text>
</svg>