<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Correlation versus causation</title>
  <desc id="desc">A hand-drawn comparison showing that correlation is two events appearing together, while causation requires intervention and stable reproduction.</desc>
  <defs>
    <marker id="arrow-ink" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#2F6F73" stroke-width="2" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="980" height="520" rx="16" fill="#EDECE8"/>
  <rect x="20" y="64" width="940" height="436" rx="12" fill="#F5F4F0"/>
  <text x="490" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Correlation is not causation / 相关性不是因果性</text>
  <path d="M490 90 C482 192 486 342 491 472" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="8 8"/>

  <text x="155" y="116" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="30" fill="#1A1A1A">Correlation</text>
  <text x="160" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">A and B appear together / A 与 B 一起出现</text>

  <rect x="80" y="190" width="130" height="78" rx="9" fill="#F8D7D0" stroke="#C75B3A" stroke-width="2"/>
  <path d="M84 196 C118 181 164 198 207 190" fill="none" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="145" y="234" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="26" fill="#1A1A1A">A</text>
  <text x="145" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">action / 做了某事</text>

  <rect x="330" y="190" width="130" height="78" rx="9" fill="#F8D7D0" stroke="#C75B3A" stroke-width="2"/>
  <path d="M334 266 C376 282 420 258 458 271" fill="none" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="395" y="234" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="26" fill="#1A1A1A">B</text>
  <text x="395" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">outcome / 好结果</text>

  <path d="M214 229 C250 209 292 209 326 229" fill="none" stroke="#C75B3A" stroke-width="2" stroke-linecap="round" stroke-dasharray="7 6"/>
  <text x="270" y="207" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="19" fill="#C75B3A">observed together</text>

  <path d="M104 344 C178 301 310 304 416 348" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="6 8"/>
  <text x="260" y="382" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="24" fill="#1A1A1A">story fills the gap</text>
  <text x="260" y="416" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="28" fill="#C75B3A">A caused B?</text>

  <text x="652" y="116" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="30" fill="#1A1A1A">Causation</text>
  <text x="632" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">Intervene and reproduce / 干预后可复现</text>

  <rect x="570" y="186" width="142" height="74" rx="9" fill="#D4EDDA" stroke="#2F6F73" stroke-width="2"/>
  <text x="641" y="226" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="22" fill="#1A1A1A">Intervene A</text>
  <text x="641" y="247" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">主动改变 A</text>

  <rect x="784" y="138" width="132" height="60" rx="9" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="850" y="174" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="18" fill="#1A1A1A">Control vars</text>
  <text x="850" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">控制变量</text>

  <rect x="784" y="238" width="132" height="72" rx="9" fill="#D4EDDA" stroke="#2F6F73" stroke-width="2"/>
  <text x="850" y="276" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="19" fill="#1A1A1A">B repeats</text>
  <text x="850" y="296" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">B 稳定出现</text>

  <path d="M714 214 C746 197 761 180 781 168" fill="none" stroke="#2F6F73" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M714 230 C746 249 762 263 781 274" fill="none" stroke="#2F6F73" stroke-width="2" marker-end="url(#arrow-green)"/>

  <path d="M615 366 C676 336 801 338 886 366" fill="none" stroke="#2F6F73" stroke-width="2" stroke-dasharray="5 6"/>
  <rect x="620" y="390" width="250" height="58" rx="9" fill="#F5F4F0" stroke="#2F6F73" stroke-width="2"/>
  <text x="745" y="426" text-anchor="middle" font-family="'Kaiti SC','STKaiti','Bradley Hand',cursive" font-size="23" fill="#1A1A1A">Repeatable = closer to causal</text>
  <text x="745" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">能复现，才接近因果</text>
</svg>
