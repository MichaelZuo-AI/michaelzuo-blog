<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Correlation versus causation</title>
  <desc id="desc">Correlation only shows two events together. Causation requires intervention and repeated stable outcomes.</desc>
  <defs>
    <marker id="arrow-gray" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#8C8777" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#4E8D67" stroke-width="2" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="960" height="560" rx="16" fill="#EDECE8"/>
  <rect x="24" y="68" width="912" height="468" rx="12" fill="#F5F4F0"/>
  <text x="480" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Correlation vs. Causation</text>
  <path d="M480 96 C474 210 476 360 482 506" fill="none" stroke="#B8B2A4" stroke-width="1.5" stroke-dasharray="8 8"/>

  <text x="240" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="21" font-weight="700" fill="#C75B3A">Correlation</text>
  <text x="240" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">things appear together</text>

  <rect x="84" y="190" width="140" height="86" rx="10" fill="#F8D7D0" stroke="#C75B3A" stroke-width="2"/>
  <text x="154" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">A happens</text>
  <text x="154" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6B6651">action A</text>

  <rect x="300" y="190" width="140" height="86" rx="10" fill="#F8D7D0" stroke="#C75B3A" stroke-width="2"/>
  <text x="370" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">B appears</text>
  <text x="370" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6B6651">outcome B</text>

  <path d="M228 232 C252 222 274 222 296 232" fill="none" stroke="#C75B3A" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow-gray)"/>
  <text x="262" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8C8777">same time</text>

  <rect x="110" y="356" width="288" height="88" rx="10" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="254" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">story fills the gap</text>
  <text x="254" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#C75B3A">“A caused B” is not proven</text>

  <text x="716" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="21" font-weight="700" fill="#4E8D67">Causation</text>
  <text x="716" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">intervene, then reproduce</text>

  <rect x="554" y="176" width="168" height="78" rx="10" fill="#D4EDDA" stroke="#4E8D67" stroke-width="2"/>
  <text x="638" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#1A1A1A">Change A</text>
  <text x="638" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6B6651">intervention</text>

  <rect x="768" y="142" width="132" height="66" rx="10" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="834" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#1A1A1A">Control</text>
  <text x="834" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">other vars</text>

  <rect x="768" y="250" width="132" height="78" rx="10" fill="#D4EDDA" stroke="#4E8D67" stroke-width="2"/>
  <text x="834" y="281" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#1A1A1A">B repeats</text>
  <text x="834" y="306" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">stable B</text>

  <path d="M724 203 C744 192 752 184 766 176" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M724 226 C744 252 752 270 766 286" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="584" y="390" width="292" height="78" rx="10" fill="#F5F4F0" stroke="#4E8D67" stroke-width="2"/>
  <text x="730" y="421" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#1A1A1A">Repeatable result</text>
  <text x="730" y="447" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6B6651">reproducible causal signal</text>
</svg>
