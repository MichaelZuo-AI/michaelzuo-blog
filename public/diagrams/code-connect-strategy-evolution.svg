<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420">
  <rect width="820" height="420" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="340" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-se" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arr-se-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Strategy Evolution: Before vs. After Code Connect</text>

  <!-- BEFORE: Original 5 strategies -->
  <text x="50" y="100" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#C75B3A">BEFORE</text>
  <text x="50" y="117" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">all custom-built</text>

  <rect x="130" y="82" width="145" height="38" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="202" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Component Registry</text>

  <rect x="290" y="82" width="145" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="362" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Token Reverse Lookup</text>

  <rect x="450" y="82" width="110" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="505" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Variant Merge</text>

  <rect x="575" y="82" width="120" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="635" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Visual Grounding</text>

  <rect x="130" y="130" width="145" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="202" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Preprocessing Agent</text>

  <text x="410" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#C75B3A">5 strategies, all require custom engineering</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="780" y2="210" stroke="#D5D3CD" stroke-width="1"/>

  <!-- AFTER: Code Connect + remaining strategies -->
  <text x="50" y="245" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6BAF7B">AFTER</text>
  <text x="50" y="262" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">Code Connect as foundation</text>

  <!-- Code Connect foundation -->
  <rect x="130" y="230" width="640" height="50" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="450" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Figma Code Connect (MCP Server)</text>
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6651">replaces Component Registry + partial Variant mapping</text>

  <!-- Remaining strategies on top -->
  <rect x="130" y="295" width="145" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="202" y="319" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Token Reverse Lookup</text>

  <rect x="290" y="295" width="120" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="350" y="319" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Visual Grounding</text>

  <rect x="425" y="295" width="170" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="510" y="319" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Preprocessing Agent</text>
  <text x="510" y="333" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">(scope reduced)</text>

  <rect x="610" y="295" width="160" height="38" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="690" y="319" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Confidence Gate</text>

  <text x="410" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#6BAF7B">Foundation layer is Figma-native; custom engineering only for gaps</text>

  <!-- Arrows from Code Connect to remaining -->
  <line x1="202" y1="280" x2="202" y2="295" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-se-green)"/>
  <line x1="350" y1="280" x2="350" y2="295" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-se-green)"/>
  <line x1="510" y1="280" x2="510" y2="295" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-se-green)"/>
  <line x1="690" y1="280" x2="690" y2="295" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-se-green)"/>
</svg>