<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360">
  <rect width="820" height="360" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="280" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-rp" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arr-rp-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Revised Implementation Priority</text>

  <!-- Phase labels -->
  <text x="70" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8C8777">PHASE</text>
  <text x="250" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8C8777">ACTION</text>
  <text x="620" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8C8777">EFFORT</text>
  <text x="720" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8C8777">IMPACT</text>

  <line x1="40" y1="95" x2="780" y2="95" stroke="#D5D3CD" stroke-width="1"/>

  <!-- Phase 0: Code Connect -->
  <rect x="40" y="105" width="50" height="45" rx="6" ry="6" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="65" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6BAF7B">0</text>

  <rect x="105" y="105" width="490" height="45" rx="6" ry="6" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="350" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Enable Figma Code Connect + MCP Server</text>
  <text x="350" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6651">Replaces Component Registry — zero custom code needed</text>

  <text x="620" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Low</text>
  <text x="720" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Very High</text>

  <!-- Arrow -->
  <line x1="65" y1="150" x2="65" y2="165" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-rp-green)"/>

  <!-- Phase 1 -->
  <rect x="40" y="170" width="50" height="45" rx="6" ry="6" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="65" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">1</text>

  <rect x="105" y="170" width="490" height="45" rx="6" ry="6" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="350" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Token Reverse Lookup + Confidence Gate</text>
  <text x="350" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6651">Handles hardcoded styles + quality assurance</text>

  <text x="620" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Low–Med</text>
  <text x="720" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">High</text>

  <!-- Arrow -->
  <line x1="65" y1="215" x2="65" y2="230" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-rp)"/>

  <!-- Phase 2 -->
  <rect x="40" y="235" width="50" height="45" rx="6" ry="6" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="65" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">2</text>

  <rect x="105" y="235" width="490" height="45" rx="6" ry="6" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="350" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Visual Grounding + Preprocessing Agent (reduced scope)</text>
  <text x="350" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6651">Only for ad-hoc elements outside design system</text>

  <text x="620" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">High</text>
  <text x="720" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Medium</text>

  <!-- Bottom note -->
  <text x="410" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#8C8777">Phase 0 alone covers ~60% of original Normalization Layer's value with ~10% of the effort</text>
</svg>