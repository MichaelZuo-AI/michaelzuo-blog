<svg xmlns="http://www.w3.org/2000/svg" width="560" height="620">
  <defs>
    <marker id="arr-gray" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arr-green" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Outer card -->
  <rect width="560" height="620" rx="16" fill="#EDECE8"/>
  <!-- Inner area -->
  <rect x="20" y="20" width="520" height="580" rx="12" fill="#F5F4F0"/>

  <!-- Title -->
  <text x="280" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">How AI Supply Overflow Creates Demand</text>

  <!-- Box 1: Input (terra cotta) -->
  <rect x="80" y="72" width="400" height="68" rx="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="280" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#C75B3A">AI scales knowledge work</text>
  <text x="280" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#C75B3A">writing · coding · analysis · design</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="140" x2="280" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- Box 2 -->
  <rect x="80" y="162" width="400" height="68" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Cost of capability drops</text>
  <text x="280" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6B6651">supply of intelligence floods the market</text>

  <!-- Arrow 2→3 -->
  <line x1="280" y1="230" x2="280" y2="250" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- Box 3 -->
  <rect x="80" y="252" width="400" height="68" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Prices drop, access expands</text>
  <text x="280" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6B6651">previously unaffordable use cases become viable</text>

  <!-- Arrow 3→4 -->
  <line x1="280" y1="320" x2="280" y2="340" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- Box 4 -->
  <rect x="80" y="342" width="400" height="68" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="370" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Latent demand unlocked</text>
  <text x="280" y="390" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6B6651">new markets that didn't exist before</text>

  <!-- Arrow 4→5 (green) -->
  <line x1="280" y1="410" x2="280" y2="430" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-green)"/>

  <!-- Box 5: Output (green) -->
  <rect x="80" y="432" width="400" height="68" rx="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="280" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#6BAF7B">New roles &amp; jobs created</text>
  <text x="280" y="480" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6BAF7B">at larger scale than what was replaced</text>

  <!-- Bottom note -->
  <text x="280" y="566" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-style="italic" fill="#8C8777">Pattern repeated: printing press → desktop publishing → creator economy → and now AI</text>
</svg>
