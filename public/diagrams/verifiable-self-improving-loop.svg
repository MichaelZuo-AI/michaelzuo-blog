<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">A verifiable task becomes a self-improving loop</title>
  <desc id="desc">A terminal-style diagram showing generation, verification, feedback, and accumulated improvement.</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#72D572" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,5 L0,9" stroke="#72D572" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,5 L0,9" stroke="#F2C15B" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="12" y="12" width="936" height="496" rx="8" fill="#12160F" stroke="#3A442F" stroke-width="1.5"/>
  <rect x="12" y="12" width="936" height="36" rx="8" fill="#171B12"/>
  <circle cx="34" cy="30" r="6" fill="#D96B5F"/>
  <circle cx="56" cy="30" r="6" fill="#F2C15B"/>
  <circle cx="78" cy="30" r="6" fill="#72D572"/>
  <rect x="28" y="64" width="904" height="420" fill="url(#grid)"/>

  <text x="48" y="102" fill="#E8F6D8" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">Once a task becomes verifiable, it becomes self-improving</text>
  <text x="48" y="128" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic">Generation becomes progress only when the environment can reject bad attempts.</text>

  <rect x="64" y="178" width="180" height="92" rx="6" fill="#20251A" stroke="#3A442F" stroke-width="1.5"/>
  <text x="92" y="214" fill="#E8F6D8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Generate</text>
  <text x="92" y="238" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">The model makes</text>
  <text x="92" y="255" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">an attempt</text>

  <rect x="298" y="178" width="180" height="92" rx="6" fill="#2A3022" stroke="#72D572" stroke-width="1.5"/>
  <text x="326" y="214" fill="#E8F6D8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Verify</text>
  <text x="326" y="238" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">Tests, evals,</text>
  <text x="326" y="255" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">runtime, review</text>

  <rect x="532" y="178" width="180" height="92" rx="6" fill="#2A2418" stroke="#F2C15B" stroke-width="1.5"/>
  <text x="560" y="214" fill="#E8F6D8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Feedback</text>
  <text x="560" y="238" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">Failure becomes</text>
  <text x="560" y="255" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">usable signal</text>

  <rect x="766" y="178" width="130" height="92" rx="6" fill="#20251A" stroke="#3A442F" stroke-width="1.5"/>
  <text x="789" y="214" fill="#E8F6D8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Improve</text>
  <text x="789" y="238" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">Better next</text>
  <text x="789" y="255" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">attempt</text>

  <path d="M244 224H294" stroke="#72D572" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <path d="M478 224H528" stroke="#72D572" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <path d="M712 224H762" stroke="#72D572" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <path d="M831 270C831 338 154 338 154 274" stroke="#F2C15B" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-amber)"/>

  <rect x="112" y="372" width="736" height="70" rx="8" fill="#20251A" fill-opacity="0.72" stroke="#4F5A40" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="142" y="404" fill="#72D572" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="13" font-weight="700">$ loop</text>
  <text x="198" y="404" fill="#E8F6D8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Reliable rejection is what turns output into accumulated capability.</text>
  <text x="198" y="426" fill="#9CA989" font-family="system-ui, -apple-system, sans-serif" font-size="12">No check, no selection. No selection, no compounding improvement.</text>
</svg>
