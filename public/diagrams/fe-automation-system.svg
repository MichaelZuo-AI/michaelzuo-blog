<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400">
  <rect width="820" height="400" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <filter id="rough1">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">FE Automation System Pipeline</text>

  <!-- Row 1: Main pipeline boxes -->
  <!-- FIGMA -->
  <rect x="20" y="50" width="150" height="56" rx="8" ry="8" fill="#F3E5F5" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="95" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">FIGMA</text>
  <text x="95" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">input</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="78" x2="210" y2="78" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- EXTRACTION -->
  <rect x="215" y="50" width="160" height="56" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="295" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">EXTRACTION</text>
  <text x="295" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">tokens + markup</text>

  <!-- Arrow 2 -->
  <line x1="375" y1="78" x2="415" y2="78" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- GENERATION -->
  <rect x="420" y="50" width="160" height="56" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="500" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">GENERATION</text>
  <text x="500" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Claude Code</text>

  <!-- Arrow 3 -->
  <line x1="580" y1="78" x2="620" y2="78" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- VERIFICATION -->
  <rect x="625" y="50" width="175" height="56" rx="8" ry="8" fill="#FFF3E0" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="712" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">VERIFICATION</text>
  <text x="712" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">7 quality gates</text>

  <!-- Fork from VERIFICATION -->
  <!-- Arrow down from VERIFICATION -->
  <line x1="712" y1="106" x2="712" y2="140" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Fork label area -->
  <!-- PASS path (left) -->
  <line x1="712" y1="150" x2="560" y2="150" stroke="#2563EB" stroke-width="2"/>
  <line x1="560" y1="150" x2="560" y2="185" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="630" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#16a34a">PASS</text>

  <!-- FAIL path (right) -->
  <line x1="712" y1="150" x2="780" y2="150" stroke="#2563EB" stroke-width="2"/>
  <line x1="780" y1="150" x2="780" y2="185" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="750" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#dc2626">FAIL</text>

  <!-- REVIEW box -->
  <rect x="480" y="190" width="160" height="50" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="560" y="212" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">REVIEW</text>
  <text x="560" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">human accept</text>

  <!-- AUTO-FIX box -->
  <rect x="710" y="190" width="100" height="50" rx="8" ry="8" fill="#FFF3E0" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="760" y="212" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">AUTO-FIX</text>
  <text x="760" y="228" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Claude retries</text>

  <!-- Auto-fix arrow back to GENERATION -->
  <path d="M 760 240 L 760 270 Q 760 280 750 280 L 500 280 Q 490 280 490 270 L 490 112" stroke="#2563EB" stroke-width="2" fill="none" marker-end="url(#arrow1)" stroke-dasharray="6,3"/>
  <text x="625" y="275" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2563EB">retry</text>

  <!-- Arrow from REVIEW to SHIP -->
  <line x1="560" y1="240" x2="560" y2="295" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- SHIP box -->
  <rect x="490" y="300" width="140" height="50" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="2" filter="url(#rough1)"/>
  <text x="560" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">SHIP</text>
</svg>