<svg xmlns="http://www.w3.org/2000/svg" width="820" height="680" viewBox="0 0 820 680">
  <!-- Outer card -->
  <rect width="820" height="680" rx="16" ry="16" fill="#EDECE8"/>
  <!-- Inner area -->
  <rect x="20" y="60" width="780" height="600" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-g2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#333">Normalization pipeline</text>

  <!-- In: Ingestion (salmon box) -->
  <rect x="200" y="85" width="340" height="65" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="370" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">In</text>
  <text x="370" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#C75B3A">Figma + Screenshots + One-pager</text>

  <!-- Arrow down -->
  <line x1="370" y1="150" x2="370" y2="178" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-g2)"/>

  <!-- Green group area containing Stages 1-4 -->
  <rect x="80" y="185" width="580" height="380" rx="12" ry="12" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>

  <!-- Stage 1: Normalization Agent -->
  <rect x="130" y="205" width="480" height="65" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="370" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Normalization Agent</text>
  <text x="370" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#777">Names + Layout + Variants + Tokens → Semantic IR</text>

  <!-- Arrow down -->
  <line x1="370" y1="270" x2="370" y2="293" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-g2)"/>

  <!-- Stage 2: Confidence Gate -->
  <rect x="180" y="300" width="380" height="55" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="370" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Confidence Gate</text>
  <text x="370" y="344" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#777">high → proceed | low → clarify | unknown → fallback</text>

  <!-- Arrow down -->
  <line x1="370" y1="355" x2="370" y2="378" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-g2)"/>

  <!-- Stage 3: Code Generation -->
  <rect x="180" y="385" width="380" height="55" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="370" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Style-First Generation</text>
  <text x="370" y="429" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#777">IR → Components → Styles → Code</text>

  <!-- Arrow down -->
  <line x1="370" y1="440" x2="370" y2="463" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-g2)"/>

  <!-- Stage 4: Self-Review -->
  <rect x="180" y="470" width="380" height="55" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="370" y="494" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Self-Review Agent</text>
  <text x="370" y="514" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#777">Verify completeness + flag uncertainties</text>

  <!-- Arrow down to PR -->
  <line x1="370" y1="525" x2="370" y2="565" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-g2)"/>

  <!-- Out: PR (salmon box) -->
  <rect x="310" y="578" width="120" height="60" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="370" y="604" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#333">Out</text>
  <text x="370" y="626" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#C75B3A">PR</text>

  <!-- Feedback loop: PR → back up to Normalization Agent -->
  <!-- Right side going up -->
  <line x1="430" y1="608" x2="710" y2="608" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="710" y1="608" x2="710" y2="237" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="710" y1="237" x2="615" y2="237" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-green)"/>

  <!-- Feedback loop label -->
  <text x="738" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6BAF7B" transform="rotate(90, 738, 390)">Feedback Loop</text>
  <text x="756" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#6BAF7B" transform="rotate(90, 756, 420)">PR review → improve pipeline</text>
</svg>
