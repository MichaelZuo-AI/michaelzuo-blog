<svg xmlns="http://www.w3.org/2000/svg" width="700" height="660">
  <!-- Outer card -->
  <rect width="700" height="660" rx="16" fill="#EDECE8"/>
  <!-- Inner area -->
  <rect x="20" y="20" width="660" height="620" rx="12" fill="#F5F4F0"/>

  <!-- Title -->
  <text x="350" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">The 5 Skills for the AI Era</text>

  <!-- Column headers -->
  <text x="100" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#8C8777" letter-spacing="1">SKILL</text>
  <text x="295" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#C75B3A" letter-spacing="1">STOP DOING</text>
  <text x="530" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#6BAF7B" letter-spacing="1">START DOING</text>

  <!-- Divider line -->
  <line x1="40" y1="92" x2="660" y2="92" stroke="#D8D6D0" stroke-width="1"/>

  <!-- ── Row 1: Direction ── -->
  <!-- Skill label -->
  <rect x="40" y="102" width="120" height="88" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="100" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Direction</text>
  <text x="100" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8C8777">taste &amp; judgment</text>
  <!-- Stop box -->
  <rect x="175" y="102" width="230" height="88" rx="8" fill="#FDF2F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="290" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#C75B3A">Executing the task</text>
  <text x="290" y="154" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">being the person who does</text>
  <!-- Start box -->
  <rect x="420" y="102" width="240" height="88" rx="8" fill="#EDF7F0" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="540" y="134" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Judging what good looks like</text>
  <text x="540" y="154" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">taste that compounds over time</text>

  <!-- ── Row 2: Context ── -->
  <rect x="40" y="202" width="120" height="88" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="100" y="242" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Context</text>
  <text x="100" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8C8777">irreplaceable edge</text>
  <rect x="175" y="202" width="230" height="88" rx="8" fill="#FDF2F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="290" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#C75B3A">Knowledge as your moat</text>
  <text x="290" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">what AI can learn from public data</text>
  <rect x="420" y="202" width="240" height="88" rx="8" fill="#EDF7F0" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="540" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Context as your moat</text>
  <text x="540" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">what only you know about this situation</text>

  <!-- ── Row 3: Cross-Domain ── -->
  <rect x="40" y="302" width="120" height="88" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="100" y="338" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Cross-</text>
  <text x="100" y="354" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Domain</text>
  <text x="100" y="372" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8C8777">breadth advantage</text>
  <rect x="175" y="302" width="230" height="88" rx="8" fill="#FDF2F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="290" y="334" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#C75B3A">Going deeper in one area</text>
  <text x="290" y="354" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">depth AI already commoditizes</text>
  <rect x="420" y="302" width="240" height="88" rx="8" fill="#EDF7F0" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="540" y="334" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Connecting 2+ domains</text>
  <text x="540" y="354" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">insights AI can't synthesize alone</text>

  <!-- ── Row 4: Relationships ── -->
  <rect x="40" y="402" width="120" height="88" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="100" y="442" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Relationships</text>
  <text x="100" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8C8777">trust &amp; accountability</text>
  <rect x="175" y="402" width="230" height="88" rx="8" fill="#FDF2F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="290" y="434" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#C75B3A">Competing on expertise</text>
  <text x="290" y="454" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">what AI can simulate</text>
  <rect x="420" y="402" width="240" height="88" rx="8" fill="#EDF7F0" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="540" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Being the first call for</text>
  <text x="540" y="448" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">high-stakes decisions</text>
  <text x="540" y="468" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">accountable in ways AI cannot be</text>

  <!-- ── Row 5: Leverage ── -->
  <rect x="40" y="502" width="120" height="88" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="100" y="542" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Leverage</text>
  <text x="100" y="560" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8C8777">compound systems</text>
  <rect x="175" y="502" width="230" height="88" rx="8" fill="#FDF2F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="290" y="534" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#C75B3A">Using AI for one-off tasks</text>
  <text x="290" y="554" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">starting from scratch every time</text>
  <rect x="420" y="502" width="240" height="88" rx="8" fill="#EDF7F0" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="540" y="534" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#6BAF7B">Building systems that compound</text>
  <text x="540" y="554" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8C8777">repeatable workflows as permanent assets</text>

  <!-- Bottom note -->
  <text x="350" y="632" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-style="italic" fill="#8C8777">Each skill is a concrete practice, not a mindset. One action each, starting today.</text>
</svg>
