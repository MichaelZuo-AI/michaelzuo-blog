<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400">
  <rect width="820" height="400" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="320" rx="12" ry="12" fill="#F5F4F0"/>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Minimum viable standard</text>

  <!-- Must Have tier (salmon — critical) -->
  <rect x="60" y="85" width="700" height="85" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="110" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#C75B3A">Must Have</text>
  <text x="240" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#6B6651">Pipeline viability depends on these</text>
  <circle cx="95" cy="135" r="4" fill="#C75B3A"/>
  <text x="110" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Semantic component naming</text>
  <circle cx="340" cy="135" r="4" fill="#C75B3A"/>
  <text x="355" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Auto Layout (no absolute)</text>
  <circle cx="570" cy="135" r="4" fill="#C75B3A"/>
  <text x="585" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Key token usage</text>
  <text x="110" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">match codebase names</text>
  <text x="570" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">colors, spacing</text>

  <!-- Should Have tier (green — quality) -->
  <rect x="110" y="190" width="600" height="75" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="155" y="215" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6BAF7B">Should Have</text>
  <text x="290" y="215" font-family="system-ui, sans-serif" font-size="12" fill="#6B6651">Affects output quality</text>
  <circle cx="145" cy="240" r="4" fill="#6BAF7B"/>
  <text x="160" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Structured Variants</text>
  <circle cx="345" cy="240" r="4" fill="#6BAF7B"/>
  <text x="360" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Annotations</text>
  <circle cx="500" cy="240" r="4" fill="#6BAF7B"/>
  <text x="515" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Responsive Constraints</text>

  <!-- Nice to Have tier (neutral — precision) -->
  <rect x="170" y="285" width="480" height="70" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="215" y="310" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#8C8777">Nice to Have</text>
  <text x="350" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#6B6651">Affects precision</text>
  <circle cx="205" cy="335" r="4" fill="#999"/>
  <text x="220" y="340" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Complete Component Properties</text>
  <circle cx="470" cy="335" r="4" fill="#999"/>
  <text x="485" y="340" font-family="system-ui, sans-serif" font-size="13" fill="#3D3929">Interaction / Prototype defs</text>
</svg>
