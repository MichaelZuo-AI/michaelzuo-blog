<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="system-ui, -apple-system, sans-serif">
  <!-- Outer card -->
  <rect x="0" y="0" width="820" height="420" rx="16" fill="#EDECE8"/>

  <!-- Title -->
  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A1A1A">The Always Hungry Pipeline</text>

  <!-- Inner area -->
  <rect x="20" y="60" width="780" height="340" rx="12" fill="#F5F4F0"/>

  <!-- Stage 1: Scout -->
  <rect x="50" y="100" width="200" height="120" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="150" y="128" text-anchor="middle" font-size="16" font-weight="600" fill="#1A1A1A">Stage 1: Scout</text>
  <text x="150" y="152" text-anchor="middle" font-size="12" fill="#6B6651">Search GitHub repos</text>
  <text x="150" y="170" text-anchor="middle" font-size="12" fill="#6B6651">Filter &amp; deduplicate</text>
  <text x="150" y="188" text-anchor="middle" font-size="12" fill="#6B6651">Triage for relevance</text>
  <text x="150" y="206" text-anchor="middle" font-size="12" fill="#6B6651">Extract candidates</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="160" x2="300" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M298,156 L306,160 L298,164" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Stage 2: Evaluate -->
  <rect x="310" y="100" width="200" height="120" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="410" y="128" text-anchor="middle" font-size="16" font-weight="600" fill="#1A1A1A">Stage 2: Evaluate</text>
  <text x="410" y="152" text-anchor="middle" font-size="12" fill="#6B6651">Create eval branch</text>
  <text x="410" y="170" text-anchor="middle" font-size="12" fill="#6B6651">Apply the change</text>
  <text x="410" y="188" text-anchor="middle" font-size="12" fill="#6B6651">Run tests / build</text>
  <text x="410" y="206" text-anchor="middle" font-size="12" fill="#6B6651">Keep or revert</text>

  <!-- Arrow 2→3 -->
  <line x1="520" y1="160" x2="560" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M558,156 L566,160 L558,164" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Stage 3: Apply -->
  <rect x="570" y="100" width="200" height="120" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="670" y="128" text-anchor="middle" font-size="16" font-weight="600" fill="#1A1A1A">Stage 3: Apply</text>
  <text x="670" y="152" text-anchor="middle" font-size="12" fill="#6B6651">Merge to main</text>
  <text x="670" y="170" text-anchor="middle" font-size="12" fill="#6B6651">Clean up branches</text>
  <text x="670" y="188" text-anchor="middle" font-size="12" fill="#6B6651">Update seen state</text>
  <text x="670" y="206" text-anchor="middle" font-size="12" fill="#6B6651">Push to remote</text>

  <!-- Input -->
  <rect x="50" y="270" width="200" height="50" rx="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="150" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="#C75B3A">CLAUDE.md</text>
  <text x="150" y="308" text-anchor="middle" font-size="11" fill="#C75B3A">Project context &amp; identity</text>

  <!-- Arrow input→scout -->
  <line x1="150" y1="270" x2="150" y2="228" stroke="#C75B3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M146,230 L150,222 L154,230" fill="none" stroke="#C75B3A" stroke-width="1.5"/>

  <!-- Output -->
  <rect x="570" y="270" width="200" height="50" rx="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="670" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="#6BAF7B">Improvements landed</text>
  <text x="670" y="308" text-anchor="middle" font-size="11" fill="#6BAF7B">Tested, committed, pushed</text>

  <!-- Arrow apply→output -->
  <line x1="670" y1="228" x2="670" y2="262" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M666,260 L670,268 L674,260" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>

  <!-- Fail revert arrow -->
  <rect x="310" y="270" width="200" height="50" rx="8" fill="#F5F4F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="410" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="#C75B3A">Failed candidates</text>
  <text x="410" y="308" text-anchor="middle" font-size="11" fill="#C75B3A">Branch deleted, no trace</text>

  <!-- Arrow eval→fail -->
  <line x1="410" y1="228" x2="410" y2="262" stroke="#C75B3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M406,260 L410,268 L414,260" fill="none" stroke="#C75B3A" stroke-width="1.5"/>

  <!-- Note -->
  <text x="410" y="375" text-anchor="middle" font-size="12" fill="#8C8777" font-style="italic">Zero human intervention. Zero new dependencies. Every change is build-verified.</text>
</svg>
