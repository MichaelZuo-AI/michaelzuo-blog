<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340">
  <rect width="820" height="340" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="260" rx="12" ry="12" fill="#F5F4F0"/>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">How to read FPI</text>

  <!-- Rising FPI (green) -->
  <rect x="50" y="85" width="220" height="210" rx="10" ry="10" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6BAF7B">Rising FPI</text>

  <!-- Upward arrow/trend -->
  <line x1="100" y1="200" x2="220" y2="140" stroke="#6BAF7B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="200" r="4" fill="#6BAF7B"/>
  <circle cx="160" cy="170" r="4" fill="#6BAF7B"/>
  <circle cx="220" cy="140" r="4" fill="#6BAF7B"/>

  <text x="160" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D3929">AI tooling is maturing</text>
  <text x="160" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D3929">Trust is being earned</text>
  <text x="160" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6BAF7B">Leverage unlocked</text>

  <!-- Flat FPI (gray) -->
  <rect x="300" y="85" width="220" height="210" rx="10" ry="10" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="410" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#8C8777">Flat FPI</text>

  <!-- Flat trend line -->
  <line x1="350" y1="170" x2="470" y2="168" stroke="#8C8777" stroke-width="3" stroke-linecap="round"/>
  <circle cx="350" cy="170" r="4" fill="#8C8777"/>
  <circle cx="410" cy="169" r="4" fill="#8C8777"/>
  <circle cx="470" cy="168" r="4" fill="#8C8777"/>

  <text x="410" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D3929">Scaling linearly</text>
  <text x="410" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D3929">More output = more hand-holding</text>
  <text x="410" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8C8777">Volume, not leverage</text>

  <!-- Falling FPI (red) -->
  <rect x="550" y="85" width="220" height="210" rx="10" ry="10" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="660" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#C75B3A">Falling FPI</text>

  <!-- Downward trend -->
  <line x1="600" y1="140" x2="720" y2="200" stroke="#C75B3A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="600" cy="140" r="4" fill="#C75B3A"/>
  <circle cx="660" cy="170" r="4" fill="#C75B3A"/>
  <circle cx="720" cy="200" r="4" fill="#C75B3A"/>

  <text x="660" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D3929">AI creating more work</text>
  <text x="660" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3D3929">for humans, not less</text>
  <text x="660" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#C75B3A">Red flag</text>
</svg>
