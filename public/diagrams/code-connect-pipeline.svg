<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <rect width="820" height="380" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="300" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-cp" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arr-cp-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
    <marker id="arr-cp-orange" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#C75B3A" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Revised Pipeline with Code Connect</text>

  <!-- Row 1: Figma Design -->
  <rect x="50" y="85" width="130" height="50" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="115" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Figma Design</text>
  <text x="115" y="123" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">any quality level</text>

  <!-- Arrow to Code Connect -->
  <line x1="180" y1="110" x2="220" y2="110" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cp-green)"/>

  <!-- Code Connect block -->
  <rect x="228" y="80" width="180" height="60" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="318" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Code Connect</text>
  <text x="318" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6651">component → code mapping</text>
  <text x="318" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6651">+ property binding</text>

  <!-- Arrow to MCP Server -->
  <line x1="408" y1="110" x2="448" y2="110" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cp-green)"/>

  <!-- MCP Server -->
  <rect x="456" y="85" width="140" height="50" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="526" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Figma MCP</text>
  <text x="526" y="123" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B6651">enriched context</text>

  <!-- Arrow to Claude Code -->
  <line x1="596" y1="110" x2="636" y2="110" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cp)"/>

  <!-- Claude Code -->
  <rect x="644" y="85" width="130" height="50" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="709" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Claude Code</text>

  <!-- Divider -->
  <line x1="40" y1="160" x2="780" y2="160" stroke="#D5D3CD" stroke-width="1"/>

  <!-- Label: what Code Connect doesn't cover -->
  <text x="410" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#C75B3A">Gaps Code Connect doesn't cover</text>

  <!-- Gap boxes row 1 -->
  <rect x="50" y="200" width="210" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="155" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Hardcoded Tokens</text>
  <text x="155" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">→ Token Reverse Lookup</text>

  <rect x="280" y="200" width="230" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="395" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Absolute Positioning</text>
  <text x="395" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">→ Visual Grounding</text>

  <rect x="530" y="200" width="240" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="650" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Unmapped / Ad-hoc Components</text>
  <text x="650" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">→ Preprocessing Agent + Confidence Gate</text>

  <!-- Row 3: One-pager input -->
  <rect x="50" y="270" width="150" height="45" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="125" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">One-pager / PRD</text>
  <text x="125" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">business context</text>

  <!-- Arrow from one-pager to gap strategies -->
  <line x1="200" y1="292" x2="280" y2="292" stroke="#C75B3A" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cp-orange)"/>

  <!-- Cross-validation box -->
  <rect x="288" y="270" width="200" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="388" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Cross-validation</text>
  <text x="388" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8C8777">semantic signal for gap cases</text>

  <!-- Note -->
  <text x="410" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#8C8777">Code Connect handles the happy path; custom strategies handle the long tail</text>
</svg>