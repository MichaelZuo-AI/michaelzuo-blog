<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="system-ui, -apple-system, sans-serif">
  <!-- Outer card -->
  <rect x="0" y="0" width="820" height="380" rx="16" fill="#EDECE8"/>

  <!-- Title -->
  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A1A1A">Real Run: Scouting michaelzuo.vip</text>

  <!-- Inner area -->
  <rect x="20" y="60" width="780" height="300" rx="12" fill="#F5F4F0"/>

  <!-- Funnel stages - horizontal flow -->
  <!-- Stage: 12 repos -->
  <rect x="50" y="110" width="130" height="70" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="115" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#1A1A1A">12</text>
  <text x="115" y="162" text-anchor="middle" font-size="12" fill="#6B6651">repos searched</text>

  <!-- Arrow -->
  <line x1="188" y1="145" x2="218" y2="145" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M216,141 L224,145 L216,149" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Stage: 5 new -->
  <rect x="230" y="110" width="130" height="70" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="295" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#1A1A1A">5</text>
  <text x="295" y="162" text-anchor="middle" font-size="12" fill="#6B6651">new since last run</text>

  <!-- Arrow -->
  <line x1="368" y1="145" x2="398" y2="145" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M396,141 L404,145 L396,149" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Stage: 3 candidates -->
  <rect x="410" y="110" width="130" height="70" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="475" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#1A1A1A">3</text>
  <text x="475" y="162" text-anchor="middle" font-size="12" fill="#6B6651">candidates triaged</text>

  <!-- Arrow -->
  <line x1="548" y1="145" x2="578" y2="145" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M576,141 L584,145 L576,149" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Stage: 2 applied -->
  <rect x="590" y="110" width="180" height="70" rx="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="680" y="140" text-anchor="middle" font-size="28" font-weight="700" fill="#6BAF7B">2</text>
  <text x="680" y="162" text-anchor="middle" font-size="12" fill="#6BAF7B">applied to production</text>

  <!-- What was applied -->
  <rect x="50" y="220" width="350" height="55" rx="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="70" y="244" font-size="13" font-weight="600" fill="#1A1A1A">JSON-LD Article structured data</text>
  <text x="70" y="262" font-size="11" fill="#6B6651">SEO rich snippets for every blog post</text>
  <circle cx="388" cy="247" r="4" fill="#6BAF7B"/>

  <rect x="420" y="220" width="350" height="55" rx="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="440" y="244" font-size="13" font-weight="600" fill="#1A1A1A">Native Next.js sitemap.ts</text>
  <text x="440" y="262" font-size="11" fill="#6B6651">Replaced postbuild script with type-safe built-in</text>
  <circle cx="758" cy="247" r="4" fill="#6BAF7B"/>

  <!-- What was dropped -->
  <rect x="50" y="290" width="350" height="45" rx="8" fill="#F5F4F0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="70" y="312" font-size="13" font-weight="600" fill="#C75B3A">robots.ts</text>
  <text x="175" y="312" font-size="11" fill="#6B6651">— already existed as public/robots.txt</text>

  <!-- Note -->
  <text x="410" y="350" text-anchor="middle" font-size="12" fill="#8C8777" font-style="italic">Sources: leerob/next-mdx-blog, nelsonlaidev/nelsonlai.dev</text>
</svg>
