<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="system-ui, -apple-system, sans-serif">
  <!-- Outer card -->
  <rect width="780" height="380" rx="16" fill="#EDECE8"/>

  <!-- Title -->
  <text x="40" y="42" font-size="22" font-weight="bold" fill="#1A1A1A">Connect the Dots</text>

  <!-- Inner area -->
  <rect x="20" y="60" width="740" height="300" rx="12" fill="#F5F4F0"/>

  <!-- MCP Protocol layer (bottom) -->
  <rect x="60" y="270" width="660" height="60" rx="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="390" y="296" text-anchor="middle" font-size="15" font-weight="600" fill="#1A1A1A">MCP Protocol</text>
  <text x="390" y="314" text-anchor="middle" font-size="12" fill="#6BAF7B">Open standard — the universal glue between AI agents and tools</text>

  <!-- Stitch MCP (Google) -->
  <rect x="60" y="85" width="200" height="100" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">Stitch MCP</text>
  <text x="160" y="132" text-anchor="middle" font-size="12" fill="#8C8777">Google</text>
  <text x="160" y="155" text-anchor="middle" font-size="11" fill="#6B6651">Text → High-fidelity UI</text>
  <text x="160" y="170" text-anchor="middle" font-size="11" fill="#6B6651">HTML + Tailwind code</text>

  <!-- Feature Crew -->
  <rect x="290" y="85" width="200" height="100" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="390" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">Feature Crew</text>
  <text x="390" y="132" text-anchor="middle" font-size="12" fill="#8C8777">Open Source Skills</text>
  <text x="390" y="155" text-anchor="middle" font-size="11" fill="#6B6651">Spec → Code → Evaluate</text>
  <text x="390" y="170" text-anchor="middle" font-size="11" fill="#6B6651">→ QA → Ship</text>

  <!-- Claude Code (Anthropic) -->
  <rect x="520" y="85" width="200" height="100" rx="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="620" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">Claude Code</text>
  <text x="620" y="132" text-anchor="middle" font-size="12" fill="#8C8777">Anthropic</text>
  <text x="620" y="155" text-anchor="middle" font-size="11" fill="#6B6651">AI agent runtime</text>
  <text x="620" y="170" text-anchor="middle" font-size="11" fill="#6B6651">Skills + Worktrees + MCP</text>

  <!-- Arrows down to MCP layer -->
  <line x1="160" y1="185" x2="160" y2="270" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M156,265 L160,273 L164,265" fill="none" stroke="#999" stroke-width="1.5"/>

  <line x1="390" y1="185" x2="390" y2="270" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M386,265 L390,273 L394,265" fill="none" stroke="#999" stroke-width="1.5"/>

  <line x1="620" y1="185" x2="620" y2="270" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M616,265 L620,273 L624,265" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Horizontal connection arrows between boxes -->
  <line x1="260" y1="135" x2="290" y2="135" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M285,131 L293,135 L285,139" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>

  <line x1="490" y1="135" x2="520" y2="135" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M515,131 L523,135 L515,139" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>

  <!-- Labels on arrows -->
  <text x="275" y="125" text-anchor="middle" font-size="9" fill="#6BAF7B">designs</text>
  <text x="505" y="125" text-anchor="middle" font-size="9" fill="#6BAF7B">runs on</text>

  <!-- Bottom note -->
  <text x="390" y="350" text-anchor="middle" font-size="11" fill="#8C8777" font-style="italic">Not designed to work together. But they do. Perfectly.</text>
</svg>