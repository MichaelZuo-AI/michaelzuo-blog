<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <rect width="820" height="380" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="300" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-cg" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Confidence Gate</text>

  <!-- Input: IR Node -->
  <rect x="60" y="160" width="140" height="55" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="130" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">IR Node</text>
  <text x="130" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#C75B3A">+ confidence score</text>

  <!-- Arrow to decision diamond -->
  <line x1="200" y1="187" x2="260" y2="187" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cg)"/>

  <!-- Decision diamond (as rounded rect) -->
  <rect x="268" y="155" width="140" height="65" rx="8" ry="8" fill="#EDECE8" stroke="#999" stroke-width="2"/>
  <text x="338" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Evaluate</text>
  <text x="338" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">confidence</text>

  <!-- HIGH: > 0.80 -->
  <line x1="408" y1="165" x2="490" y2="105" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cg)"/>
  <rect x="498" y="80" width="250" height="55" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="623" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Auto-proceed</text>
  <text x="623" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6651">confidence &gt; 0.80</text>
  <!-- Threshold label -->
  <text x="460" y="125" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6BAF7B">HIGH</text>

  <!-- MEDIUM: 0.50–0.80 -->
  <line x1="408" y1="187" x2="490" y2="187" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cg)"/>
  <rect x="498" y="160" width="250" height="55" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="623" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Ask clarification</text>
  <text x="623" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6651">confidence 0.50 – 0.80</text>
  <text x="460" y="195" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8C8777">MED</text>

  <!-- LOW: < 0.50 -->
  <line x1="408" y1="210" x2="490" y2="270" stroke="#C75B3A" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-cg)"/>
  <rect x="498" y="245" width="250" height="55" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="623" y="269" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Generic fallback + TODO</text>
  <text x="623" y="289" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B6651">confidence &lt; 0.50</text>
  <text x="460" y="268" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#C75B3A">LOW</text>

  <!-- Bottom note -->
  <text x="410" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-style="italic" fill="#8C8777">Don't guess when uncertain — degrade to safe output + explicit marking</text>
</svg>
