<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480">
  <!-- Outer card -->
  <rect width="820" height="480" rx="16" ry="16" fill="#EDECE8"/>
  <!-- Inner area -->
  <rect x="20" y="60" width="780" height="400" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#333">Signal chain</text>

  <!-- In: Figma File (salmon box) -->
  <rect x="100" y="100" width="160" height="70" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="180" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Figma File</text>
  <text x="180" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#C75B3A">Structural signals</text>

  <!-- In: One-pager (salmon box) -->
  <rect x="100" y="280" width="160" height="70" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="180" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">One-pager</text>
  <text x="180" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#C75B3A">Semantic signals</text>

  <!-- Cross-validation label between the two inputs -->
  <line x1="180" y1="170" x2="180" y2="280" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="205" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#999">cross-validate</text>

  <!-- Green group area around Claude Code -->
  <rect x="370" y="160" width="230" height="130" rx="12" ry="12" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>

  <!-- Claude Code process box -->
  <rect x="400" y="190" width="170" height="70" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="485" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Claude Code</text>
  <text x="485" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#777">Generate code</text>

  <!-- Arrow: Figma → Claude Code -->
  <line x1="260" y1="135" x2="395" y2="210" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- Arrow: One-pager → Claude Code -->
  <line x1="260" y1="315" x2="395" y2="240" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- Arrow: Claude Code → PR -->
  <line x1="570" y1="225" x2="620" y2="225" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-gray)"/>

  <!-- Out: PR (salmon box) -->
  <rect x="630" y="190" width="120" height="70" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="690" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#333">PR</text>
  <text x="690" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#C75B3A">Output</text>
</svg>
