<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <rect width="700" height="200" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <filter id="rough1">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Figma File box -->
  <rect x="30" y="25" width="180" height="55" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="120" y="48" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Figma File</text>
  <text x="120" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">structural signals</text>

  <!-- One-pager box -->
  <rect x="30" y="110" width="180" height="55" rx="8" ry="8" fill="#F3E5F5" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="120" y="133" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Product One-pager</text>
  <text x="120" y="151" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">semantic signals</text>

  <!-- Cross-validation arrow -->
  <line x1="195" y1="80" x2="195" y2="110" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="225" y="100" font-family="sans-serif" font-size="10" fill="#9CA3AF">cross-validate</text>

  <!-- Converging arrows to Claude Code -->
  <line x1="210" y1="52" x2="380" y2="90" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="210" y1="137" x2="380" y2="100" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Claude Code box -->
  <rect x="385" y="65" width="150" height="60" rx="8" ry="8" fill="#FFF3E0" stroke="#333" stroke-width="1.5" filter="url(#rough1)"/>
  <text x="460" y="92" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Claude Code</text>
  <text x="460" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">generate code</text>

  <!-- Arrow to PR -->
  <line x1="535" y1="95" x2="580" y2="95" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- PR box -->
  <rect x="585" y="70" width="90" height="50" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="2" filter="url(#rough1)"/>
  <text x="630" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a">PR</text>
</svg>
