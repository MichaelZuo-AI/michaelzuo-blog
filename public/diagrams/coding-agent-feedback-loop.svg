<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500">
  <rect width="980" height="500" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="940" height="420" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="490" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">The workflow that actually raises reliability</text>

  <rect x="45" y="120" width="890" height="260" rx="12" ry="12" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="490" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">A closed loop with explicit gates</text>
  <text x="490" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">the model is one stage inside the system, not the whole system</text>

  <rect x="70" y="210" width="120" height="64" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="130" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Contract</text>
  <text x="130" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C75B3A">goal, non-goal, done</text>

  <rect x="215" y="210" width="120" height="64" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="275" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Restate</text>
  <text x="275" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">assumptions and risks</text>

  <rect x="360" y="210" width="120" height="64" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="420" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Plan</text>
  <text x="420" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">small slices only</text>

  <rect x="505" y="210" width="120" height="64" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="565" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Tests</text>
  <text x="565" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">executable contract</text>

  <rect x="650" y="210" width="120" height="64" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="710" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Implement</text>
  <text x="710" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C75B3A">minimal diff</text>

  <rect x="795" y="210" width="120" height="64" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="855" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Verify</text>
  <text x="855" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">build, tests, review</text>

  <line x1="190" y1="242" x2="215" y2="242" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="335" y1="242" x2="360" y2="242" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="480" y1="242" x2="505" y2="242" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="625" y1="242" x2="650" y2="242" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="770" y1="242" x2="795" y2="242" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <rect x="265" y="315" width="450" height="40" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="490" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">If any gate fails, go back with evidence instead of guessing harder</text>

  <line x1="855" y1="274" x2="855" y2="390" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4"/>
  <line x1="855" y1="390" x2="420" y2="390" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4"/>
  <line x1="420" y1="390" x2="420" y2="274" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>

  <line x1="855" y1="390" x2="275" y2="390" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4"/>
  <line x1="275" y1="390" x2="275" y2="274" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>

  <line x1="855" y1="390" x2="130" y2="390" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4"/>
  <line x1="130" y1="390" x2="130" y2="274" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>

  <text x="490" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" fill="#8C8777">Reliability comes from shrinking freedom and shortening the feedback loop, not from expecting one perfect prompt.</text>
</svg>
