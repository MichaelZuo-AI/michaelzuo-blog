<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <rect width="920" height="420" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="880" height="340" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="460" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Model-agnostic code-build architecture</text>

  <rect x="50" y="100" width="170" height="64" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="135" y="124" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Intent + repo state</text>
  <text x="135" y="144" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C75B3A">input</text>

  <rect x="255" y="88" width="210" height="72" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="360" y="113" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Task contract</text>
  <text x="360" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">goal, tools, outputs, pass/fail</text>

  <rect x="255" y="182" width="210" height="72" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="360" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Context packager</text>
  <text x="360" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">files, docs, constraints, policies</text>

  <rect x="255" y="276" width="210" height="72" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="360" y="301" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Independent verifier</text>
  <text x="360" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">tests, diffs, schema, policy checks</text>

  <rect x="510" y="88" width="260" height="260" rx="12" ry="12" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="640" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1A1A1A">Replaceable model layer</text>
  <text x="640" y="134" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">swap the leader here, not the workflow</text>

  <rect x="540" y="155" width="200" height="44" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="640" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Adapter: Claude / Opus</text>

  <rect x="540" y="214" width="200" height="44" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="640" y="241" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Adapter: GPT-5.4 / Codex</text>

  <rect x="540" y="273" width="200" height="44" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="640" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Adapter: next model</text>

  <rect x="790" y="164" width="95" height="64" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="837.5" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Artifacts</text>
  <text x="837.5" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C75B3A">patches, logs</text>

  <line x1="220" y1="132" x2="255" y2="124" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="465" y1="124" x2="510" y2="124" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="465" y1="218" x2="510" y2="218" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="770" y1="218" x2="790" y2="196" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="837.5" y1="228" x2="837.5" y2="312" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4"/>
  <line x1="837.5" y1="312" x2="465" y2="312" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>

  <text x="728" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" fill="#8C8777">Verification and routing stay stable even when the leading model changes.</text>
</svg>
