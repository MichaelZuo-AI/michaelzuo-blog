<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <rect width="700" height="380" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <filter id="rough3">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise" seed="8"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">Verification Pipeline — 7 Quality Gates</text>

  <!-- Outer container -->
  <rect x="120" y="40" width="460" height="260" rx="10" ry="10" fill="#FAFAFA" stroke="#333" stroke-width="1.5" filter="url(#rough3)"/>

  <!-- Gate rows -->
  <!-- Gate 1 -->
  <rect x="145" y="52" width="410" height="30" rx="6" ry="6" fill="#E3F2FD" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="72" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 1:</tspan>  tsc — Type safety</text>
  <text x="530" y="72" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Gate 2 -->
  <rect x="145" y="86" width="410" height="30" rx="6" ry="6" fill="#E8F5E9" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="106" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 2:</tspan>  eslint — Code standards</text>
  <text x="530" y="106" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Gate 3 -->
  <rect x="145" y="120" width="410" height="30" rx="6" ry="6" fill="#E3F2FD" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="140" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 3:</tspan>  vitest — Unit tests</text>
  <text x="530" y="140" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Gate 4 -->
  <rect x="145" y="154" width="410" height="30" rx="6" ry="6" fill="#E8F5E9" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="174" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 4:</tspan>  next build — Production build</text>
  <text x="530" y="174" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Gate 5 -->
  <rect x="145" y="188" width="410" height="30" rx="6" ry="6" fill="#E3F2FD" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="208" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 5:</tspan>  playwright — E2E tests</text>
  <text x="530" y="208" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Gate 6 -->
  <rect x="145" y="222" width="410" height="30" rx="6" ry="6" fill="#E8F5E9" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="242" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 6:</tspan>  screenshots — Visual regression</text>
  <text x="530" y="242" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Gate 7 -->
  <rect x="145" y="256" width="410" height="30" rx="6" ry="6" fill="#FFF3E0" stroke="#333" stroke-width="1" filter="url(#rough3)"/>
  <text x="165" y="276" font-family="sans-serif" font-size="12" fill="#1a1a1a"><tspan font-weight="bold" fill="#2563EB">Gate 7:</tspan>  axe-core — Accessibility</text>
  <text x="530" y="276" text-anchor="end" font-family="monospace" font-size="11" fill="#16a34a">&#10003;</text>

  <!-- Bottom outcomes -->
  <!-- ALL PASS path -->
  <line x1="280" y1="300" x2="280" y2="330" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow3)"/>
  <rect x="190" y="335" width="180" height="36" rx="8" ry="8" fill="#E8F5E9" stroke="#16a34a" stroke-width="1.5" filter="url(#rough3)"/>
  <text x="280" y="358" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16a34a">ALL PASS  &#8594;  PR created</text>

  <!-- ANY FAIL path -->
  <line x1="460" y1="300" x2="460" y2="330" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow3)"/>
  <rect x="360" y="335" width="220" height="36" rx="8" ry="8" fill="#FFF3E0" stroke="#dc2626" stroke-width="1.5" filter="url(#rough3)"/>
  <text x="470" y="358" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#dc2626">ANY FAIL  &#8594;  Auto-fix  &#8594;  retry</text>
</svg>