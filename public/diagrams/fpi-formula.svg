<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340">
  <rect width="820" height="340" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="260" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-fpi" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">FPI = Features Delivered / Human Interventions</text>

  <!-- Sprint 1 box -->
  <rect x="60" y="90" width="320" height="200" rx="10" ry="10" fill="#EDECE8" stroke="#D5D3CD" stroke-width="1.5"/>
  <text x="220" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8C8777">Sprint 1</text>

  <!-- Features -->
  <rect x="85" y="140" width="120" height="50" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="145" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1A1A1A">8</text>
  <text x="145" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6651">features</text>

  <!-- Divider -->
  <text x="230" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#8C8777">/</text>

  <!-- Interventions -->
  <rect x="255" y="140" width="100" height="50" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="305" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1A1A1A">5</text>
  <text x="305" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6651">interventions</text>

  <!-- Result -->
  <text x="220" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8C8777">FPI =</text>
  <text x="220" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#C75B3A">1.6</text>

  <!-- Arrow between sprints -->
  <line x1="400" y1="190" x2="430" y2="190" stroke="#6BAF7B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-fpi)"/>
  <text x="415" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">1 month</text>

  <!-- Sprint 2 box -->
  <rect x="440" y="90" width="320" height="200" rx="10" ry="10" fill="#EDECE8" stroke="#D5D3CD" stroke-width="1.5"/>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8C8777">Sprint 2</text>

  <!-- Features -->
  <rect x="465" y="140" width="120" height="50" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="525" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1A1A1A">12</text>
  <text x="525" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6651">features</text>

  <!-- Divider -->
  <text x="610" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#8C8777">/</text>

  <!-- Interventions -->
  <rect x="635" y="140" width="100" height="50" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="685" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1A1A1A">3</text>
  <text x="685" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6651">interventions</text>

  <!-- Result -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8C8777">FPI =</text>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#6BAF7B">4.0</text>
</svg>
