<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" viewBox="0 0 820 340">
  <rect width="820" height="340" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="780" height="260" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arr-ba" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arr-ba-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="410" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Before vs. after</text>

  <!-- BEFORE row -->
  <text x="50" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#C75B3A">BEFORE</text>
  <text x="50" y="122" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">fragile</text>

  <rect x="120" y="90" width="130" height="45" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="185" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Figma Raw</text>

  <line x1="250" y1="112" x2="320" y2="112" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-ba)"/>

  <rect x="330" y="90" width="150" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="405" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Claude Code</text>

  <line x1="480" y1="112" x2="550" y2="112" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-ba)"/>

  <rect x="560" y="90" width="80" height="45" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="600" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">PR</text>

  <!-- "strong dependency" label -->
  <text x="405" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#C75B3A">Strong dependency on input quality</text>

  <!-- Divider -->
  <line x1="50" y1="175" x2="770" y2="175" stroke="#D5D3CD" stroke-width="1"/>

  <!-- AFTER row -->
  <text x="50" y="210" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6BAF7B">AFTER</text>
  <text x="50" y="227" font-family="system-ui, sans-serif" font-size="11" fill="#8C8777">robust</text>

  <rect x="120" y="195" width="110" height="45" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="175" y="223" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Figma Raw</text>

  <line x1="230" y1="217" x2="260" y2="217" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-ba-green)"/>

  <rect x="268" y="190" width="150" height="55" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="343" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Normalization</text>
  <text x="343" y="233" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B6651">absorb chaos</text>

  <line x1="418" y1="217" x2="448" y2="217" stroke="#6BAF7B" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-ba-green)"/>

  <rect x="456" y="195" width="110" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="511" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Semantic IR</text>

  <line x1="566" y1="217" x2="596" y2="217" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-ba)"/>

  <rect x="604" y="195" width="100" height="45" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="654" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Claude Code</text>

  <line x1="704" y1="217" x2="724" y2="217" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-ba)"/>

  <rect x="732" y="200" width="50" height="35" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="757" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">PR</text>

  <!-- "absorb here" label -->
  <text x="343" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-style="italic" fill="#6BAF7B">Non-standardization absorbed here</text>
</svg>
