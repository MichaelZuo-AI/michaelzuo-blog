<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" role="img" aria-labelledby="title desc">
  <title id="title">Harness engineering loop</title>
  <desc id="desc">A loop from requirement, sampling, ranking, tests, static checks, feedback, and accepted code.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#4E8D67" stroke-width="2" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9" fill="none" stroke="#C75B3A" stroke-width="2" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="960" height="680" rx="16" fill="#EDECE8"/>
  <rect x="24" y="68" width="912" height="588" rx="12" fill="#F5F4F0"/>
  <text x="480" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">Harness engineering loop</text>

  <text x="480" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6B6651">The model proposes candidates. The harness selects, verifies, and feeds back.</text>

  <rect x="82" y="174" width="160" height="82" rx="10" fill="#D4EDDA" stroke="#4E8D67" stroke-width="2"/>
  <text x="162" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Requirement</text>
  <text x="162" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">goal / boundary</text>

  <rect x="306" y="174" width="150" height="82" rx="10" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="381" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Sampling</text>
  <text x="381" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">candidates</text>

  <rect x="530" y="174" width="150" height="82" rx="10" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="605" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Ranking</text>
  <text x="605" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">compare / choose</text>

  <rect x="734" y="174" width="150" height="82" rx="10" fill="#F8D7D0" stroke="#C75B3A" stroke-width="2"/>
  <text x="809" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Tests</text>
  <text x="809" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">automated checks</text>

  <rect x="734" y="370" width="150" height="82" rx="10" fill="#F8D7D0" stroke="#C75B3A" stroke-width="2"/>
  <text x="809" y="401" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Static check</text>
  <text x="809" y="427" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">lint / types</text>

  <rect x="520" y="370" width="160" height="82" rx="10" fill="#D4EDDA" stroke="#4E8D67" stroke-width="2"/>
  <text x="600" y="401" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Accepted</text>
  <text x="600" y="427" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">shippable code</text>

  <rect x="306" y="370" width="150" height="82" rx="10" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="381" y="401" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Feedback</text>
  <text x="381" y="427" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">failure evidence</text>

  <path d="M246 215 C270 213 284 213 302 215" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M458 215 C486 213 504 213 526 215" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M682 215 C704 213 718 213 730 215" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M809 258 C830 298 830 330 809 368" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M732 411 C710 411 696 411 684 411" fill="none" stroke="#4E8D67" stroke-width="2" marker-end="url(#arrow-green)"/>

  <path d="M518 411 C494 411 478 411 460 411" fill="none" stroke="#C75B3A" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M381 368 C356 326 356 300 381 258" fill="none" stroke="#C75B3A" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M306 411 C196 398 145 335 158 258" fill="none" stroke="#C75B3A" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow-red)"/>

  <rect x="162" y="538" width="636" height="70" rx="10" fill="#F5F4F0" stroke="#999" stroke-width="2"/>
  <text x="480" y="568" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Raw model use samples. Harness controls distribution.</text>
  <text x="480" y="592" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6B6651">The harness turns random wins into repeatable outcomes.</text>
</svg>
