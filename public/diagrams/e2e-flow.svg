<svg xmlns="http://www.w3.org/2000/svg" width="820" height="550" viewBox="0 0 820 550">
  <rect width="820" height="550" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow5d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="rough5">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise" seed="15"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">End-to-End Flow — Swim Lanes</text>

  <!-- Swim lane backgrounds -->
  <!-- Designer lane -->
  <rect x="10" y="45" width="800" height="110" rx="6" fill="#F3E5F5" opacity="0.25" stroke="#333" stroke-width="1"/>
  <text x="30" y="68" font-family="sans-serif" font-size="13" font-weight="bold" fill="#7B1FA2">DESIGNER</text>

  <!-- Engineer lane -->
  <rect x="10" y="160" width="800" height="140" rx="6" fill="#E3F2FD" opacity="0.25" stroke="#333" stroke-width="1"/>
  <text x="30" y="183" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565C0">ENGINEER</text>

  <!-- System lane -->
  <rect x="10" y="305" width="800" height="200" rx="6" fill="#E8F5E9" opacity="0.25" stroke="#333" stroke-width="1"/>
  <text x="30" y="328" font-family="sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">SYSTEM</text>

  <!-- ===== DESIGNER LANE ===== -->
  <!-- Design in Figma -->
  <rect x="60" y="80" width="150" height="45" rx="8" ry="8" fill="#F3E5F5" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="135" y="107" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Design in Figma</text>

  <!-- Arrow -->
  <line x1="210" y1="102" x2="260" y2="102" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Ready for dev -->
  <rect x="265" y="80" width="150" height="45" rx="8" ry="8" fill="#F3E5F5" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="340" y="107" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Ready for dev</text>

  <!-- Cross-lane arrow: Designer to Engineer -->
  <line x1="340" y1="125" x2="135" y2="195" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow5d)"/>

  <!-- ===== ENGINEER LANE ===== -->
  <!-- Write specs -->
  <rect x="60" y="195" width="160" height="45" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="140" y="215" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Write specs</text>
  <text x="140" y="231" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">(~30 min)</text>

  <!-- Arrow -->
  <line x1="220" y1="218" x2="260" y2="218" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Commit specs -->
  <rect x="265" y="195" width="140" height="45" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="335" y="222" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Commit specs</text>

  <!-- Cross-lane arrow: Engineer to System -->
  <line x1="335" y1="240" x2="135" y2="345" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow5d)"/>

  <!-- Review PR (later) -->
  <rect x="530" y="195" width="120" height="45" rx="8" ry="8" fill="#E3F2FD" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="590" y="222" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Review PR</text>

  <!-- Arrow -->
  <line x1="650" y1="218" x2="670" y2="218" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Accept -->
  <rect x="675" y="195" width="90" height="45" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="720" y="222" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Accept</text>

  <!-- Arrow down to Merge -->
  <line x1="720" y1="240" x2="720" y2="265" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Merge + deploy -->
  <rect x="645" y="270" width="150" height="30" rx="8" ry="8" fill="#E8F5E9" stroke="#16a34a" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="720" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#16a34a">Merge + Deploy</text>

  <!-- ===== SYSTEM LANE ===== -->
  <!-- Token sync -->
  <rect x="60" y="345" width="140" height="45" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="130" y="372" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Token sync</text>

  <!-- Arrow -->
  <line x1="200" y1="368" x2="230" y2="368" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Markup export -->
  <rect x="235" y="345" width="150" height="45" rx="8" ry="8" fill="#E8F5E9" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="310" y="372" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Markup export</text>

  <!-- Arrow -->
  <line x1="385" y1="368" x2="415" y2="368" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Claude generates -->
  <rect x="420" y="345" width="160" height="45" rx="8" ry="8" fill="#FFF3E0" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="500" y="372" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Claude generates</text>

  <!-- Arrow -->
  <line x1="500" y1="390" x2="500" y2="420" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Verification -->
  <rect x="390" y="425" width="220" height="45" rx="8" ry="8" fill="#FFF3E0" stroke="#333" stroke-width="1.5" filter="url(#rough5)"/>
  <text x="500" y="447" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Verification</text>
  <text x="500" y="463" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">(7 quality gates)</text>

  <!-- Fork from Verification -->
  <!-- PASS path -->
  <line x1="500" y1="470" x2="500" y2="495" stroke="#2563EB" stroke-width="2"/>
  <line x1="500" y1="495" x2="590" y2="495" stroke="#2563EB" stroke-width="2"/>
  <rect x="555" y="483" width="65" height="24" rx="6" fill="#E8F5E9" stroke="#16a34a" stroke-width="1.2"/>
  <text x="587" y="500" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">PASS</text>

  <!-- Arrow up from PASS to Review PR -->
  <line x1="590" y1="483" x2="590" y2="245" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow5d)"/>
  <text x="600" y="340" font-family="sans-serif" font-size="10" fill="#16a34a" transform="rotate(-90,600,340)">PR created</text>

  <!-- FAIL path -->
  <line x1="500" y1="495" x2="400" y2="495" stroke="#2563EB" stroke-width="2"/>
  <rect x="340" y="483" width="65" height="24" rx="6" fill="#FFF3E0" stroke="#dc2626" stroke-width="1.2"/>
  <text x="372" y="500" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626">FAIL</text>

  <!-- Auto-fix loop -->
  <path d="M 340 495 L 310 495 Q 300 495 300 485 L 300 375 Q 300 365 310 365 L 415 365" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow5)"/>
  <text x="290" y="435" font-family="sans-serif" font-size="10" fill="#dc2626" transform="rotate(-90,290,435)">auto-fix + retry</text>

  <!-- "later" label between Commit specs and Review PR -->
  <text x="478" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#888">later...</text>
  <line x1="405" y1="218" x2="525" y2="218" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>
</svg>