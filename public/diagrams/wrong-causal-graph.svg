<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470">
  <rect width="980" height="470" rx="16" ry="16" fill="#EDECE8"/>
  <rect x="20" y="60" width="940" height="390" rx="12" ry="12" fill="#F5F4F0"/>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#6BAF7B" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="490" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A1A">The causal graph we want vs. the causal graph we actually have</text>

  <rect x="45" y="95" width="390" height="285" rx="12" ry="12" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="240" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">What we wish were true</text>
  <text x="240" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#C75B3A">a clean one-shot pipeline</text>

  <rect x="70" y="200" width="88" height="56" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="114" y="223" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Intent</text>
  <text x="114" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">clear in mind</text>

  <rect x="180" y="200" width="88" height="56" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="224" y="223" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">SPEC</text>
  <text x="224" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">perfectly faithful</text>

  <rect x="290" y="200" width="88" height="56" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="334" y="223" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Claude</text>
  <text x="334" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">acts like executor</text>

  <rect x="70" y="285" width="308" height="60" rx="8" ry="8" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="224" y="311" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#1A1A1A">Correct code</text>
  <text x="224" y="331" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">requirements match and no surprises</text>

  <line x1="158" y1="228" x2="180" y2="228" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="268" y1="228" x2="290" y2="228" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="334" y1="256" x2="334" y2="285" stroke="#6BAF7B" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>

  <rect x="465" y="95" width="470" height="285" rx="12" ry="12" fill="#D4EDDA" stroke="#6BAF7B" stroke-width="1.5"/>
  <text x="700" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">What actually happens</text>
  <text x="700" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6651">a noisy system with hidden losses and free invention</text>

  <rect x="495" y="185" width="112" height="56" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="551" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Intent</text>
  <text x="551" y="227" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">still partly tacit</text>

  <rect x="635" y="185" width="112" height="56" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="691" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">SPEC</text>
  <text x="691" y="227" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C75B3A">compression loss</text>

  <rect x="775" y="185" width="130" height="56" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="840" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Repo context</text>
  <text x="840" y="227" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C75B3A">missing constraints</text>

  <rect x="565" y="275" width="120" height="56" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="625" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Model priors</text>
  <text x="625" y="317" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C75B3A">fills the blanks</text>

  <rect x="715" y="275" width="120" height="56" rx="8" ry="8" fill="#F5F4F0" stroke="#999" stroke-width="1.5"/>
  <text x="775" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1A1A1A">Code output</text>
  <text x="775" y="317" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6651">locally plausible</text>

  <rect x="625" y="345" width="150" height="24" rx="8" ry="8" fill="#F8D7D0" stroke="#C75B3A" stroke-width="1.5"/>
  <text x="700" y="361" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#C75B3A">weak verification lets bugs escape</text>

  <line x1="607" y1="213" x2="635" y2="213" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="747" y1="213" x2="775" y2="213" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="840" y1="241" x2="840" y2="270" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="840" y1="270" x2="685" y2="303" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="747" y1="241" x2="715" y2="275" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="685" y1="241" x2="625" y2="275" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>
  <line x1="685" y1="331" x2="715" y2="331" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-gray)"/>

  <text x="490" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" fill="#8C8777">The failure mode is not one bad prompt. It is a multi-step system with hidden losses and unbounded freedom.</text>
</svg>
